<!-- modules/items/train_ticket/ticket.html -->
<div class="ticket-container">
    <div class="ticket-card">
        <div class="ticket-border">
            <div class="ticket-header">
                <span class="ticket-title">HOGWARTS EXPRESS</span>
            </div>
            <div class="ticket-body">
                <div class="platform-circle">
                    <span class="platform-num">9¾</span>
                </div>
                <div class="ticket-info">
                    <div class="info-row">
                        <span class="label">FROM:</span>
                        <span class="value">LONDON KING'S CROSS</span>
                    </div>
                    <div class="info-row">
                        <span class="label">TO:</span>
                        <span class="value">HOGWARTS CASTLE</span>
                    </div>
                    <div class="info-row">
                        <span class="label">CLASS:</span>
                        <span class="value">FIRST CLASS</span>
                    </div>
                </div>
            </div>
            <div class="ticket-footer">
                <span class="serial-number">№ 072491</span>
                <span class="one-way">ONE WAY ONLY</span>
            </div>
        </div>
    </div>
    <button id="btn-close-ticket" class="close-btn">收起车票</button>
</div>
